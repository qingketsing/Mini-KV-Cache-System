name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION_FILE: go.mod
  BUF_VERSION: v1.50.0
  ACTIONLINT_VERSION: v1.7.12

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go.sum

      - name: Verify module downloads
        run: go mod verify

      - name: Lint GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}

      - name: Check formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "${unformatted}" ]]; then
            echo "The following Go files need gofmt:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run vet
        run: go vet ./...

      - name: Check whitespace errors
        shell: bash
        run: |
          empty_tree="$(git hash-object -t tree /dev/null)"
          git diff --check "${empty_tree}" HEAD

  protobuf:
    name: Protobuf
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go.sum

      - name: Lint protocol definitions
        run: go run github.com/bufbuild/buf/cmd/buf@${BUF_VERSION} lint api

      - name: Regenerate protocol bindings
        run: go run github.com/bufbuild/buf/cmd/buf@${BUF_VERSION} generate

      - name: Check generated-code drift
        shell: bash
        run: |
          git diff --exit-code -- gen/go
          generated_status="$(git status --porcelain -- gen/go)"
          if [[ -n "${generated_status}" ]]; then
            echo "Protocol generation produced untracked files:"
            echo "${generated_status}"
            exit 1
          fi

  unit:
    name: Unit Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go.sum

      - name: Run unit tests
        run: go test ./... -count=1 -coverprofile=coverage.out

      - name: Print coverage summary
        run: go tool cover -func=coverage.out

      - name: Upload coverage profile
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 14

  race:
    name: Race Tests
    needs:
      - unit
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}
          cache-dependency-path: go.sum

      - name: Run race detector
        run: go test -race ./... -count=1
